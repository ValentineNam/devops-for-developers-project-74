name: CI

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose plugin
        run: |
          set -eux
          arch=$(uname -m)
          if [ "$arch" = "x86_64" ]; then
            url="https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64"
          elif [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
            url="https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64"
          else
            echo "Unsupported architecture: $arch" >&2
            exit 1
          fi
          sudo mkdir -p /usr/local/lib/docker/cli-plugins
          sudo curl -L "$url" -o /usr/local/lib/docker/cli-plugins/docker-compose
          sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          docker compose version

      - name: Run tests with Docker Compose
        run: make ci

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: v4lentinenam/javascript-fastify-blog:latest
