services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: ["make", "dev"]
    environment:
      - NODE_ENV=development
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    stdin_open: true
    tty: true

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
